name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache --parallel --no-daemon --max-workers=4
        env:
          GRADLE_OPTS: -Xmx4g -XX:+UseParallelGC -Dorg.gradle.caching=true

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/AlexStream-TV.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlexStream-TV
          path: android/app/build/outputs/apk/debug/AlexStream-TV.apk
          if-no-files-found: error

      - name: Update latest release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: latest
          name: 'AlexStream TV - Latest Build'
          body: |
            Latest build from commit ${{ github.sha }}
            Built on ${{ github.event.head_commit.timestamp }}
          prerelease: false
          files: android/app/build/outputs/apk/debug/AlexStream-TV.apk
